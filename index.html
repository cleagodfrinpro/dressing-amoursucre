<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mon Dressing — Amour Sucré NewGen (refonte UX)</title>
<style>
  :root{
    --rose:#ed6d7b;--rose-d:#d9556a;--rose-soft:#fbd0cf;--rose-pale:#fdeaec;
    --yellow:#ffb827;--yellow-d:#e69f12;--green:#6ab571;--green-d:#549a5b;
    --cream:#fff6ef;--cream-2:#fde9dc;
    --ink:#3e2918;--ink-soft:#8a6f5c;--owned:#3fae6b;--line:#f2dcd6;
    --panel:rgba(255,251,247,.94);--shadow:0 8px 24px rgba(180,90,110,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif;color:var(--ink);background:#e7bfc7;-webkit-font-smoothing:antialiased}
  .app{height:100vh;display:flex;overflow:hidden;position:relative}
  :focus-visible{outline:3px solid var(--rose);outline-offset:2px}
  button{font-family:inherit}

  .room{position:absolute;inset:0;z-index:0;background:url("bedroom.jpg") center/cover no-repeat, linear-gradient(180deg,#f6dcc4,#d9a98c)}

  .sidenav{position:relative;z-index:3;background:var(--rose);display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 0;width:58px;flex:0 0 58px}
  .nav{width:42px;height:42px;border:none;border-radius:14px;background:transparent;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:.85;position:relative;transition:.12s}
  .nav svg{width:22px;height:22px}
  .nav:hover{background:rgba(255,255,255,.22);opacity:1;transform:translateY(-1px)}
  .nav.active{background:#fff;color:var(--rose-d);opacity:1}
  .nav .tip{position:absolute;left:50px;top:50%;transform:translateY(-50%);background:#3e2918;color:#fff;font-size:11px;font-weight:700;padding:4px 9px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:.12s;z-index:9}
  .nav:hover .tip{opacity:1}

  .center{position:relative;z-index:2;flex:1;min-width:0;display:flex}

  .topleft{position:absolute;top:14px;left:14px;z-index:6;display:flex;flex-direction:column;gap:10px;align-items:flex-start}
  .btn-back{display:inline-flex;align-items:center;gap:8px;border:none;background:#fff;color:var(--ink);font-weight:800;font-size:14px;padding:9px 16px 9px 12px;border-radius:999px;box-shadow:var(--shadow);cursor:pointer;transition:.12s}
  .btn-back:hover{background:var(--rose-pale);transform:translateY(-1px)}
  .currencies{display:flex;flex-direction:column;gap:7px}
  .cur{display:flex;align-items:center;gap:8px;background:#fff;border-radius:999px;padding:6px 14px 6px 6px;box-shadow:var(--shadow);font-weight:800;font-size:13px;color:var(--ink)}
  .cur .ic{width:26px;height:26px;border-radius:50%;flex:0 0 26px}
  .cur .g{background:radial-gradient(circle at 35% 30%,#ffd76b,#e8a11d)}
  .cur .m{background:radial-gradient(circle at 35% 30%,#a98bff,#6a49d8)}
  .cur .lab{color:var(--ink-soft);font-weight:700;font-size:11px}

  .topright{position:absolute;top:14px;right:14px;z-index:6;display:flex;gap:8px;background:rgba(255,255,255,.6);border-radius:999px;padding:5px;backdrop-filter:blur(4px);box-shadow:var(--shadow)}
  .rbtn{display:inline-flex;align-items:center;gap:7px;border:none;background:#fff;color:var(--ink);font-weight:700;font-size:12px;padding:8px 13px;border-radius:999px;cursor:pointer;transition:.12s}
  .rbtn:hover{background:var(--rose-pale)}
  .rbtn.active{background:var(--rose);color:#fff}.rbtn.active svg{color:#fff}
  .rbtn svg{width:17px;height:17px;color:var(--rose-d)}

  .toolwrap{flex:1;position:relative;display:flex;align-items:flex-start;justify-content:center;min-width:0;overflow:hidden}
  /* top center: look tabs + save together, out of avatar's way */
  .topcenter{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5;align-items:center;flex-wrap:wrap;justify-content:center;max-width:70%}
  .topcenter .lk{background:var(--panel);border:none;border-radius:999px;padding:8px 15px;font-weight:700;font-size:13px;cursor:pointer;box-shadow:var(--shadow);color:var(--ink);transition:.12s}
  .topcenter .lk:hover{background:#fff}
  .topcenter .lk.on{background:var(--rose);color:#fff}
  .topcenter .save{border:none;background:var(--green);color:#fff;font-weight:800;font-size:15px;padding:12px 26px;border-radius:999px;cursor:pointer;box-shadow:0 6px 18px rgba(106,181,113,.6);display:inline-flex;align-items:center;gap:9px;transition:.12s}
  .topcenter .save:hover{background:var(--green-d);transform:translateY(-1px);box-shadow:0 8px 22px rgba(106,181,113,.7)}
  .topcenter .save svg{width:19px;height:19px}
  .save-fab{position:absolute;right:16px;bottom:16px;z-index:6;border:none;background:#2f9150;color:#fff;font-weight:800;font-size:15px;padding:14px 26px;border-radius:999px;cursor:pointer;box-shadow:0 8px 22px rgba(30,90,50,.5), inset 0 -2px 0 rgba(0,0,0,.12);display:inline-flex;align-items:center;gap:9px;transition:.12s}
  .save-fab:hover{background:#277a43;transform:translateY(-2px);box-shadow:0 10px 26px rgba(30,90,50,.6), inset 0 -2px 0 rgba(0,0,0,.12)}
  .save-fab svg{width:20px;height:20px}
  .card.dim{opacity:.46}
  .card.dim:hover{opacity:1}
  .vcard.dim{opacity:.46}
  .vcard.dim:hover{opacity:1}
  /* avatar higher and fully visible */
  .avatar-wrap{position:relative;height:112%;display:flex;align-items:flex-start;z-index:2;padding-top:46px;transition:transform .12s ease;transform-origin:center center;will-change:transform;touch-action:none}
  .avatar-wrap img{height:calc(100% - 46px);filter:drop-shadow(0 12px 22px rgba(90,45,40,.5));pointer-events:none;user-select:none;-webkit-user-drag:none}
  .avatar-wrap.zoomed{cursor:grab}
  .avatar-wrap.grabbing{cursor:grabbing;transition:none}

  .worn{position:absolute;left:14px;top:50%;transform:translateY(-50%);z-index:5;width:224px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:0 10px 28px rgba(180,90,110,.24);padding:14px;max-height:72%;display:flex;flex-direction:column}
  .worn h4{margin:0 0 4px;font-size:14px;color:var(--ink);display:flex;align-items:center;gap:7px;font-weight:800}
  .worn h4 svg{width:18px;height:18px}
  .worn .hint{font-size:11px;color:var(--ink-soft);margin:0 0 10px;line-height:1.25}
  .wlist{overflow-y:auto;display:flex;flex-direction:column;gap:7px}
  .wlist::-webkit-scrollbar{width:4px}.wlist::-webkit-scrollbar-thumb{background:var(--rose-soft);border-radius:8px}
  .wrow{display:flex;align-items:center;gap:9px;background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:7px 8px}
  .wrow.dragging{opacity:.45}
  .wrow.drop-target{border-color:var(--rose);border-style:dashed;background:var(--rose-pale)}
  .wrow .whandle{cursor:grab;color:var(--ink-soft);font-size:13px;letter-spacing:-2px;user-select:none;flex:0 0 auto}
  .wrow .whandle:active{cursor:grabbing}
  .wrow .oic{width:32px;height:32px;border-radius:9px;background:var(--rose-pale);display:flex;align-items:center;justify-content:center;color:var(--rose-d);flex:0 0 32px}
  .wrow .oic svg{width:18px;height:18px}
  .wrow .wn{flex:1;font-size:12.5px;font-weight:700;line-height:1.15}
  .wrow .arrows{display:flex;flex-direction:column;gap:3px}
  .wrow .arrows button{width:24px;height:19px;border:1px solid var(--line);background:#fff;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);font-size:10px;padding:0}
  .wrow .arrows button:hover:not(:disabled){background:var(--rose-pale)}
  .wrow .arrows button:disabled{opacity:.3;cursor:not-allowed}

  .tools{position:absolute;right:14px;top:74px;z-index:4;display:flex;flex-direction:column;gap:9px;align-items:flex-end}
  .btn-appear{display:inline-flex;align-items:center;gap:9px;border:none;background:#ffc42e;color:#5a3d12;font-weight:800;font-size:13px;padding:11px 18px;border-radius:999px;cursor:pointer;box-shadow:0 5px 14px rgba(255,184,39,.5), inset 0 1px 0 rgba(255,255,255,.4);transition:.12s}
  .btn-appear:hover{background:#ffb814;transform:translateY(-1px);box-shadow:0 8px 18px rgba(255,184,39,.6), inset 0 1px 0 rgba(255,255,255,.4)}
  .btn-appear:active{transform:translateY(1px);box-shadow:0 3px 8px rgba(255,184,39,.5)}
  .btn-appear .ic{width:24px;height:24px;border-radius:50%;background:rgba(90,61,18,.15);color:#5a3d12;display:flex;align-items:center;justify-content:center;flex:0 0 24px}
  .btn-appear .ic svg{width:14px;height:14px}
  .btn-appear svg{width:20px;height:20px}
  .tool{display:inline-flex;align-items:center;gap:8px;border:none;background:#fff;color:var(--ink);font-weight:700;font-size:12px;padding:9px 14px;border-radius:999px;cursor:pointer;box-shadow:var(--shadow);transition:.12s}
  .tool:hover{background:var(--rose-pale);transform:translateY(-1px);box-shadow:0 6px 16px rgba(237,109,123,.28)}
  .tool svg{width:18px;height:18px;color:var(--rose-d)}
  .tool.page{padding-right:8px}
  .tool.page:hover{background:var(--rose);color:#fff}
  .tool.page:hover svg{color:#fff}
  .tool.page:hover .p{background:#fff;color:var(--rose-d)}
  .tool.page .p{width:20px;height:20px;background:var(--rose-pale);color:var(--rose-d);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;margin-left:2px;flex:0 0 20px}
  .tool.page .p svg{width:12px;height:12px;color:inherit}
  .tools .divider{height:1px;width:70%;background:rgba(255,255,255,.6);margin:2px 0;align-self:flex-end}

  .rail{position:relative;z-index:2;display:flex;flex-direction:column;align-items:stretch;gap:4px;padding:0 8px 12px;overflow-y:auto;width:120px;flex:0 0 120px;background:linear-gradient(180deg,#ffe1e7,#ffd4dd);border-left:1px solid var(--rose-soft);border-right:1px solid var(--rose-soft);scrollbar-width:thin;scrollbar-color:var(--rose) transparent}
  .rail::-webkit-scrollbar{width:7px}
  .rail::-webkit-scrollbar-thumb{background:var(--rose);border-radius:99px}
  .rail-head{position:sticky;top:0;z-index:3;background:linear-gradient(180deg,#ffe1e7 65%,rgba(255,225,231,0));padding:12px 2px 8px;font-size:11px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--rose-d);text-align:center}
  .rail::-webkit-scrollbar{width:5px}.rail::-webkit-scrollbar-thumb{background:var(--rose-soft);border-radius:9px}
  .cat{border:none;border-radius:14px;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 2px;color:var(--ink-soft);flex:0 0 auto;transition:.1s}
  .cat .ic{width:46px;height:46px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 7px rgba(180,90,110,.16);transition:.1s}
  .cat svg{width:25px;height:25px}
  .cat .lbl{font-size:11.5px;font-weight:700;line-height:1.1;text-align:center;color:var(--ink);max-width:108px}
  .cat:hover .ic{background:var(--rose-pale);transform:scale(1.05)}
  .cat.active .ic{background:var(--rose);color:#fff;box-shadow:0 4px 12px rgba(237,109,123,.45)}
  .cat.active .lbl{color:var(--rose-d)}
  .cat.catdim{opacity:.32}
  .cat.catdim .ic{filter:grayscale(.6)}
  .cat.catdim:hover{opacity:.6}

  .panel{position:relative;z-index:2;background:var(--panel);backdrop-filter:blur(8px);display:flex;flex-direction:column;min-height:0;width:470px;flex:0 0 470px;border-left:1px solid var(--line)}
  .panel-head{padding:14px 16px 10px;border-bottom:1px solid var(--line)}
  .panel-title{display:flex;align-items:center;gap:10px}
  .panel-title h2{margin:0;font-size:19px}
  .panel-title .num{margin-left:auto;font-size:13px;color:var(--ink-soft);font-weight:700}
  .toolbar{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
  .btn-filter{display:inline-flex;align-items:center;gap:8px;border:none;background:var(--rose);color:#fff;border-radius:999px;padding:10px 18px;font-weight:800;cursor:pointer;font-size:14px;box-shadow:0 4px 12px rgba(237,109,123,.4);transition:.12s}
  .btn-filter:hover{background:var(--rose-d);transform:translateY(-1px)}
  .btn-filter .fcount{background:#fff;color:var(--rose-d);border-radius:999px;padding:1px 8px;font-size:12px}
  .btn-reset{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--rose-soft);background:#fff;color:var(--rose-d);border-radius:999px;padding:9px 14px;font-weight:800;cursor:pointer;font-size:13px;transition:.12s}
  .btn-reset:hover{background:var(--rose);color:#fff;border-color:var(--rose)}
  .btn-reset:hover svg{color:#fff}
  .btn-reset svg{color:var(--rose-d)}
  .btn-soft{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 13px;font-weight:700;cursor:pointer;font-size:13px;color:var(--ink);transition:.12s}
  .btn-soft:hover{background:var(--rose-pale)}
  .btn-soft.on{background:var(--rose);color:#fff;border-color:var(--rose)}
  .btn-soft.on svg{color:#fff}
  .sort-wrap{position:relative}
  .sort-menu{position:absolute;top:46px;left:0;background:#fff;border-radius:14px;box-shadow:var(--shadow);padding:6px;display:none;flex-direction:column;gap:2px;min-width:190px;z-index:8;border:1px solid var(--line)}
  .sort-menu.open{display:flex}
  .sort-menu button{display:flex;align-items:center;border:none;background:transparent;padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;color:var(--ink);text-align:left;width:100%}
  .sort-menu button:hover{background:var(--rose-pale)}
  .sort-menu button.on{color:var(--rose-d)}

  .avail{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
  .av{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 13px;font-weight:700;font-size:12px;cursor:pointer;color:var(--ink-soft);display:inline-flex;align-items:center;gap:6px;transition:.12s}
  .av:hover{background:var(--rose-pale)}
  .av .pill{width:10px;height:10px;border-radius:50%}
  .pill.own{background:var(--owned)}.pill.buy{background:var(--rose)}.pill.no{background:#bcae9c}
  .av.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .av .c{opacity:.55;font-weight:700}.av.on .c{opacity:.75}
  .av .chk{width:14px;height:14px;border-radius:4px;border:1.5px solid currentColor;display:inline-flex;align-items:center;justify-content:center;font-size:10px}
  .av.on .chk{background:#fff;color:var(--ink);border-color:#fff}

  .grid{overflow-y:auto;overflow-x:hidden;padding:14px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;align-content:start;flex:1;min-height:0}
  .card{background:#fff;border-radius:16px;border:2px solid var(--line);padding:8px;display:flex;flex-direction:column;gap:6px;position:relative;box-shadow:0 3px 9px rgba(180,90,110,.09);transition:transform .12s,box-shadow .12s,border-color .12s}
  .act{align-self:stretch;text-align:center;border-radius:999px;padding:8px;font-weight:800;font-size:13px;box-sizing:border-box;max-width:100%;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .act.wear{background:var(--rose-pale);color:var(--rose-d)}
  .act.ported{background:var(--rose);color:#fff}
  .act.try{background:var(--cream-2);color:var(--ink)}
  .card.click{cursor:pointer}
  .card.click:hover{transform:translateY(-3px);box-shadow:0 8px 18px rgba(180,90,110,.2);border-color:var(--rose-soft)}
  .card.sel{border-color:var(--rose);box-shadow:0 6px 16px rgba(237,109,123,.3)}
  .card.expanded{grid-column:1/-1;border-color:var(--rose-soft)}
  .thumb{height:80px;border-radius:11px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fde9ec,#f7dfe6);position:relative;color:var(--rose-d);overflow:hidden}
  .patt{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1}
  .fill{position:absolute;top:0;left:0;right:0;bottom:0;z-index:0}
  .silh{position:relative;z-index:2;display:flex}
  .silh svg{opacity:.95;filter:drop-shadow(0 1px 2px var(--sh,rgba(0,0,0,.3)))}
  .thumb img{width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;padding:4px;box-sizing:border-box}
  .thumb svg{width:42px;height:42px;opacity:.72;position:relative;z-index:1}
  .swatch-fill{position:absolute;inset:0;opacity:.45}
  .worn-badge{position:absolute;top:6px;right:6px;background:var(--rose);color:#fff;font-size:9px;font-weight:800;padding:3px 8px;border-radius:999px;z-index:6;display:flex;align-items:center;gap:3px}
  .owncount{position:absolute;top:6px;right:6px;background:#fff;color:var(--ink-soft);font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;border:1px solid var(--line);z-index:6}
  .tag-new{position:absolute;top:6px;left:6px;background:#e9f7ee;color:#2f8f52;font-size:9px;font-weight:800;padding:2px 6px;border-radius:999px;border:1px solid #b8e6c8;z-index:6}
  .name{font-size:13px;font-weight:700;line-height:1.25;min-height:30px}
  .owned-tag{font-size:12px;font-weight:700;color:var(--owned);display:inline-flex;align-items:center;gap:5px}
  .owned-tag .gd{width:9px;height:9px;border-radius:50%;background:var(--owned);display:inline-block;flex:0 0 9px}
  .avail-mini{display:flex;flex-wrap:wrap;gap:6px;min-height:16px}
  .avail-mini .am{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--ink-soft)}
  .avail-mini .d{width:8px;height:8px;border-radius:50%;flex:0 0 8px}
  .avail-mini .d.own{background:var(--owned)}.avail-mini .d.buy{background:var(--rose)}.avail-mini .d.no{background:#bcae9c}
  .indispo-tag{position:absolute;top:6px;left:6px;background:#d33a30;color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;z-index:6;box-shadow:0 1px 3px rgba(0,0,0,.25);display:inline-flex;align-items:center;gap:3px}
  .lockic{width:10px;height:10px;color:#fff}
  .try-note{font-size:11px;color:#c8392f;font-weight:800}
  .colors{display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-height:18px}
  .csw{width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;padding:0;transition:.1s}
  .csw:hover{transform:scale(1.15)}
  .csw.on{box-shadow:0 0 0 2px var(--rose)}
  .csw.lock{opacity:.4}
  .cmore{font-size:10px;font-weight:800;color:var(--rose-d);background:var(--rose-pale);border:none;border-radius:999px;padding:2px 7px;cursor:pointer}
  .cta{border:none;border-radius:999px;padding:7px;font-weight:800;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.12s}
  .cta.buy{background:var(--rose);color:#fff}.cta.buy:hover{background:var(--rose-d)}
  .cta.owned{background:#eaf7ee;color:var(--owned);cursor:default}
  .cta.try{background:var(--cream-2);color:var(--ink)}.cta.try:hover{background:#f6dcc8}
  .cta.wear{background:var(--rose);color:#fff}.cta.wear:hover{background:var(--rose-d)}
  .cta.ported{background:var(--ink);color:#fff}
  .card.locked{opacity:.55;filter:grayscale(.4)}
  .mini-coin{width:13px;height:13px;border-radius:50%;display:inline-block}
  .empty{grid-column:1/-1;padding:36px 10px;text-align:center;color:var(--ink-soft)}

  /* expanded coloris grid inside a group card */
  .variant-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:4px}
  .vcard{border:1.5px solid var(--line);border-radius:12px;padding:6px;display:flex;flex-direction:column;gap:5px;background:#fff;position:relative;transition:.12s}
  .vcard.click{cursor:pointer}
  .vcard.click:hover{border-color:var(--rose-soft);transform:translateY(-2px);box-shadow:0 5px 12px rgba(180,90,110,.16)}
  .vcard.sel{border-color:var(--rose);box-shadow:0 3px 10px rgba(237,109,123,.25)}
  .vthumb{height:56px;border-radius:9px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#fde9ec,#f7dfe6)}
  .vthumb img{width:100%;height:100%;object-fit:contain;position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;padding:3px;box-sizing:border-box}
  .vthumb svg{width:28px;height:28px;opacity:.7;position:relative;z-index:1;color:var(--rose-d)}
  .vname{font-size:11px;font-weight:700;line-height:1.1}
  .vworn{position:absolute;top:4px;right:4px;background:var(--rose);color:#fff;font-size:8px;font-weight:800;padding:2px 6px;border-radius:999px;z-index:6}
  .vstate{border-radius:999px;padding:5px;font-weight:800;font-size:10px;text-align:center;display:flex;align-items:center;justify-content:center;gap:4px}
  .vstate.wear{background:var(--rose-pale);color:var(--rose-d)}
  .vstate.on{background:var(--rose);color:#fff}
  .vstate.buy{background:var(--rose);color:#fff}
  .vstate.no{background:#f0eae2;color:#a99986}
  .vstate.tryv{background:var(--cream-2);color:var(--ink)}
  .vbuy{border:none;border-radius:999px;padding:4px;font-weight:800;font-size:10px;cursor:pointer;background:var(--rose);color:#fff;display:flex;align-items:center;justify-content:center;gap:4px}
  .vbuy:hover{background:var(--rose-d)}
  .vindispo{position:absolute;top:4px;left:4px;background:#d33a30;color:#fff;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;z-index:6;box-shadow:0 1px 3px rgba(0,0,0,.25);display:inline-flex;align-items:center;gap:3px}
  .expand-head{grid-column:1/-1;display:flex;align-items:center;gap:8px;font-weight:800;font-size:13px;margin-bottom:2px}
  .expand-head .close{margin-left:auto;border:none;background:var(--rose-pale);color:var(--rose-d);border-radius:999px;width:26px;height:26px;cursor:pointer;font-size:15px}

  .overlay{position:fixed;inset:0;background:rgba(90,40,50,.35);z-index:20;display:none}
  .overlay.open{display:block}
  .drawer{position:fixed;top:0;right:0;height:100%;width:360px;max-width:92vw;background:var(--cream);z-index:21;transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column;box-shadow:-8px 0 30px rgba(90,40,50,.25)}
  .drawer.open{transform:translateX(0)}
  .drawer-head{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid var(--line)}
  .drawer-head h2{margin:0;font-size:18px}.drawer-head .num{margin-left:auto;font-size:13px;color:var(--ink-soft);font-weight:700}
  .drawer-body{overflow:auto;padding:16px;flex:1}
  .fgroup{margin-bottom:16px}
  .fgroup h3{margin:0 0 8px;font-size:12px;letter-spacing:.5px;color:var(--ink-soft);text-transform:uppercase}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink);transition:.1s}
  .chip:hover{background:var(--rose-pale)}
  .chip.on{background:var(--rose);color:#fff;border-color:var(--rose)}
  .chip.zero{opacity:.38;cursor:not-allowed;text-decoration:line-through}
  .chip .c{opacity:.6;font-weight:700}
  .swatches{display:flex;flex-wrap:wrap;gap:9px}
  .sw{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px var(--line);cursor:pointer;transition:.1s}
  .sw:hover{transform:scale(1.1)}
  .sw.on{box-shadow:0 0 0 3px var(--rose)}
  .sub{border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;background:#fff}
  .sub summary{list-style:none;cursor:pointer;padding:10px 13px;font-weight:800;font-size:13px;display:flex;align-items:center;gap:8px}
  .sub summary::-webkit-details-marker{display:none}
  .sub summary .arw{margin-left:auto;transition:.15s}.sub[open] summary .arw{transform:rotate(90deg)}
  .checks{padding:2px 2px 4px;display:flex;flex-direction:column;gap:2px}
  .checks label{display:flex;align-items:center;gap:9px;padding:8px 10px;font-size:13px;cursor:pointer;border-radius:10px;border:1px solid transparent}
  .checks label:hover{background:var(--rose-pale)}
  .checks input{width:17px;height:17px;accent-color:var(--rose);cursor:pointer}
  .checks .c{margin-left:auto;opacity:.5;font-weight:700;font-size:12px}
  .checks label.zerochk{opacity:.4;cursor:not-allowed}
  .checks label.zerochk:hover{background:transparent}
  .checks label.dimmed{opacity:.45}
  .checks label.dimmed:hover{opacity:1}
  .drawer-foot{padding:14px 16px;border-top:1px solid var(--line);display:flex;gap:10px}
  .drawer-foot button{flex:1;border:none;border-radius:999px;padding:12px;font-weight:800;cursor:pointer}
  .reset{background:#fff;border:1px solid var(--line)!important;color:var(--ink)}
  .apply{background:var(--rose);color:#fff}

  .toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:#3e2918;color:#fff;padding:12px 18px;border-radius:14px;font-weight:700;font-size:14px;opacity:0;transition:.25s;z-index:30;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:980px){
    .app{flex-wrap:wrap}.sidenav{width:46px;flex:0 0 46px}.rail{width:84px;flex:0 0 84px}
    .worn{display:none}
    .panel{position:fixed;top:0;right:0;height:100%;width:90vw;z-index:15;transform:translateX(100%);transition:transform .22s;box-shadow:-8px 0 30px rgba(90,40,50,.25)}
    .panel.open{transform:translateX(0)}
    .mobile-open{position:fixed;bottom:18px;right:18px;z-index:14;background:var(--rose);color:#fff;border:none;border-radius:999px;padding:14px 20px;font-weight:800;box-shadow:var(--shadow);cursor:pointer;display:flex;gap:8px;align-items:center}
    .variant-grid{grid-template-columns:repeat(3,1fr)}
  }
  @media (min-width:981px){.mobile-open{display:none}}
  @media (max-width:520px){.grid{grid-template-columns:1fr 1fr}.variant-grid{grid-template-columns:repeat(2,1fr)}}
</style>

function imgFor(model,color){return IMAGES[model+'|'+color]||IMAGES[model]||null;}
function priceBucket(v){if(v.state!=="buy")return null;if(v.cur==="gem")return"Gemmes";
 if(v.price<50)return"< 50";if(v.price<=200)return"50–200";return"> 200";}
function passVariant(v){
 if(availSel.size&&!availSel.has(v.state))return false;
 if(filters.colors.size&&!filters.colors.has(v.color))return false;
 if(filters.prices.size){const b=priceBucket(v);if(!b||!filters.prices.has(b))return false;}
 return true;}
function passModelMeta(m){
 if(filters.styles.size&&!filters.styles.has(m.style))return false;
 if(filters.motifs.size&&!filters.motifs.has(m.motif))return false;
 if(filters.subtypes.size&&!filters.subtypes.has(m.subtype))return false;
 return true;}
function globalFilterActive(){return !!(availSel.size||filters.colors.size||filters.prices.size||filters.styles.size||filters.motifs.size||filters.subtypes.size);}
function passGlobal(v){const m=v.modelRef||v;
 if(availSel.size&&!availSel.has(v.state))return false;
 if(filters.colors.size&&!filters.colors.has(v.color))return false;
 if(filters.prices.size){const b=priceBucket(v);if(!b||!filters.prices.has(b))return false;}
 if(filters.styles.size&&!filters.styles.has(m.style))return false;
 if(filters.motifs.size&&!filters.motifs.has(m.motif))return false;
 if(filters.subtypes.size&&!filters.subtypes.has(m.subtype))return false;
 return true;}

function catHasMatch(cat){return VARIANTS.some(v=>v.cat===cat&&passGlobal(v));}
function p4s(v){return v.state==="buy"?(v.cur==="gem"?v.price*100:v.price):-1;}
function sortList(l){
 const rank=x=>x.state==="own"?0:(x.state==="buy"?1:2);
 l.sort((a,b)=>{
   if(rank(a)!==rank(b))return rank(a)-rank(b);
   if(sortMode===0){ if(a.state==="own")return b.acq-a.acq; if(a.state==="buy")return p4s(a)-p4s(b); return 0; }
   if(sortMode===1)return p4s(a)-p4s(b);
   return p4s(b)-p4s(a);
 });}
function visibleFlat(){let l=VARIANTS.filter(v=>v.cat===activeCat&&passModelMeta(v.modelRef)&&passVariant(v));sortList(l);return l;}
function repVariant(vs){const own=vs.filter(v=>v.state==="own");if(own.length)return own.sort((a,b)=>b.acq-a.acq)[0];
 const buy=vs.filter(v=>v.state==="buy");if(buy.length)return buy.sort((a,b)=>p4s(a)-p4s(b))[0];return vs[0];}
function visibleGrouped(){
 let ms=MODELS.filter(m=>m.cat===activeCat&&passModelMeta(m));
 ms=ms.map(m=>({m,vs:m.variants.filter(passVariant)})).filter(x=>x.vs.length>0);
 const vrank=x=>x.state==="own"?0:(x.state==="buy"?1:2);
 ms.forEach(x=>x.vs.sort((a,b)=>{if(vrank(a)!==vrank(b))return vrank(a)-vrank(b);
   if(a.state==="own")return b.acq-a.acq; if(a.state==="buy")return p4s(a)-p4s(b); return 0;}));
 ms.sort((A,B)=>{const a=repVariant(A.vs),b=repVariant(B.vs);const rank=x=>x.state==="own"?0:(x.state==="buy"?1:2);
   if(rank(a)!==rank(b))return rank(a)-rank(b);
   if(sortMode===0){if(a.state==="own")return b.acq-a.acq;if(a.state==="buy")return p4s(a)-p4s(b);return 0;}
   if(sortMode===1)return p4s(a)-p4s(b);return p4s(b)-p4s(a);});
 return ms;}

const MOTIF_OF={}; MODELS.forEach(m=>MOTIF_OF[m.cat+'|'+m.model]=m.motif);
function normHex(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(x=>x+x).join('');return h;}
function isLight(hex){const c=normHex(hex);const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return (0.299*r+0.587*g+0.114*b)>150;}
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return h;}
function patternOverlay(motif,salt){
 const h=hashStr(salt||''); const ang=(h%4)*30+30; const size=11+(h%5)*3; const half=Math.round(size/2);
 const L='rgba(255,255,255,.4)', D='rgba(0,0,0,.13)';
 switch(motif){
  case 'Rayures': return `repeating-linear-gradient(${ang}deg, ${L} 0 ${half}px, transparent ${half}px ${size}px)`;
  case 'Pois': return `radial-gradient(${L} 24%, transparent 26%) 0 0/${size}px ${size}px`;
  case 'Carreaux': return `repeating-linear-gradient(0deg, ${D} 0 2px, transparent 2px ${size}px), repeating-linear-gradient(90deg, ${D} 0 2px, transparent 2px ${size}px)`;
  case 'Fleurs': return `radial-gradient(${L} 16%, transparent 17%) 0 0/${size}px ${size}px, radial-gradient(${L} 16%, transparent 17%) ${half}px ${half}px/${size}px ${size}px`;
  case 'Animaux': return `radial-gradient(${D} 30%, transparent 32%) 0 0/${size+5}px ${size+5}px, radial-gradient(${D} 24%, transparent 26%) ${half}px ${half}px/${size+5}px ${size+5}px`;
  case 'Géométrique': return `repeating-linear-gradient(${ang}deg, ${L} 0 5px, transparent 5px 12px)`;
  default: return '';
 }}
function thumbInner(model,color,cat,img){img=img||imgFor(model,color);
 if(img)return `<img src="${img}" alt="" loading="lazy">`;
 const hex=COLHEX[color]||'#f4c9d4';
 const motif=MOTIF_OF[cat+'|'+model]||'Uni';
 const overlay=patternOverlay(motif,model+color);
 const tint=isLight(hex)?'#4a3527':'#ffffff';
 const sh=isLight(hex)?'rgba(255,255,255,.55)':'rgba(0,0,0,.4)';
 return `<span class="fill" style="background:${hex}"></span>`
  +(overlay?`<span class="patt" style="background:${overlay}"></span>`:'')
  +`<span class="silh" style="color:${tint};--sh:${sh}">${icon(cat)}</span>`;}

function renderDrawer(){

 // sélection dans sa propre dimension → multi-sélection toujours possible.
 const passMeta=m=>(!filters.styles.size||filters.styles.has(m.style))&&(!filters.motifs.size||filters.motifs.has(m.motif));

   && (!filters.motifs.size||filters.motifs.has(m.motif)) && m.variants.some(passVariant)).length;

  return `<button class="chip ${on?'on':''} ${zero?'zero':''}" ${zero?'disabled':''} onclick="toggle('${dim}','${v.replace(/'/g,"\\'")}')">${v}${zero?'':` <span class="c">(${c})</span>`}</button>`;}).join('');

  return `<button class="chip ${on?'on':''} ${zero?'zero':''}" ${zero?'disabled':''} onclick="toggle('prices','${v.replace(/'/g,"\\'")}')">${v}${zero?'':` <span class="c">(${c})</span>`}</button>`;}).join('');
 const colorCount=nm=>VARIANTS.filter(v=>passMeta(v.modelRef)
   &&(availSel.size?availSel.has(v.state):true)
   &&(!filters.prices.size||(priceBucket(v)&&filters.prices.has(priceBucket(v))))
   &&v.color===nm).length;
 const swc=COLORS.map(([nm,hex])=>{const on=filters.colors.has(nm);const c=colorCount(nm);const zero=c===0&&!on;

 const subGroupsSeen=[];
 CATS.forEach(([label,key])=>{const g=CAT_SUBGROUP[key]; if(g&&!subGroupsSeen.includes(g))subGroupsSeen.push(g);});
 subGroupsSeen.forEach(grp=>{
   const subs=SUBTYPES[grp].slice(1);

     subs.map(s=>{const on=filters.subtypes.has(s);const c=subCount(s);

     +`</div></div>`;
 });
 document.getElementById('drawerBody').innerHTML=h;}

function pickCat(k,el){activeCat=k;expandedKey=null;
 document.querySelectorAll('.cat').forEach(b=>{b.classList.remove('active');b.setAttribute('aria-pressed','false');});
 if(el){el.classList.add('active');el.setAttribute('aria-pressed','true');el.focus();}
 renderRail();renderAvail();renderGrid();renderDrawer();}
function toggleAvail(k){availSel.has(k)?availSel.delete(k):availSel.add(k);renderRail();renderAvail();renderGrid();renderDrawer();}
function clearAvail(){availSel=new Set();renderRail();renderAvail();renderGrid();renderDrawer();}
function toggle(dim,val){const s=filters[dim];s.has(val)?s.delete(val):s.add(val);renderRail();renderAvail();renderGrid();renderDrawer();}
function toggleColor(nm){const s=filters.colors;s.has(nm)?s.delete(nm):s.add(nm);renderRail();renderGrid();renderDrawer();}
function resetFilters(){filters={styles:new Set(),motifs:new Set(),prices:new Set(),colors:new Set(),subtypes:new Set()};renderRail();renderAvail();renderGrid();renderDrawer();}
function resetAll(){filters={styles:new Set(),motifs:new Set(),prices:new Set(),colors:new Set(),subtypes:new Set()};availSel=new Set();renderRail();renderAvail();renderGrid();renderDrawer();toast('Filtres réinitialisés');}
function renderSortMenu(){document.getElementById('sortMenu').innerHTML=sortLabels.map((lbl,i)=>
 `<button class="${i===sortMode?'on':''}" onclick="pickSort(${i})">${i===sortMode?'✓ ':''}${lbl}</button>`).join('');}
function toggleSortMenu(e){e.stopPropagation();renderSortMenu();document.getElementById('sortMenu').classList.toggle('open');}
function pickSort(i){sortMode=i;document.getElementById('sortLabel').textContent=sortLabels[i];
 document.getElementById('sortMenu').classList.remove('open');renderGrid();}
document.addEventListener('click',()=>document.getElementById('sortMenu').classList.remove('open'));
function toggleGroup(){grouped=!grouped;expandedKey=null;const b=document.getElementById('groupBtn');
 b.classList.toggle('on',grouped);document.getElementById('groupLabel').textContent=grouped?'Coloris groupés':'Coloris séparés';renderGrid();}
let zoomed=false, zScale=1, ztx=0, zty=0, dragging=false, sx=0, sy=0;
function applyAvatar(){document.getElementById('avatarWrap').style.transform=`translate(${ztx}px,${zty}px) scale(${zScale})`;}
function toggleZoom(){zoomed=!zoomed;zScale=zoomed?1.6:1;ztx=0;zty=0;
 const w=document.getElementById('avatarWrap');w.classList.toggle('zoomed',zoomed);
 document.getElementById('zoomBtn').classList.toggle('active',zoomed);applyAvatar();
 toast(zoomed?'Zoom activé — glisse pour déplacer la Sucrette':'Zoom désactivé');}
(function(){const w=document.getElementById('avatarWrap');
 const down=e=>{if(!zoomed)return;dragging=true;w.classList.add('grabbing');const p=e.touches?e.touches[0]:e;sx=p.clientX-ztx;sy=p.clientY-zty;e.preventDefault();};
 const move=e=>{if(!dragging)return;const p=e.touches?e.touches[0]:e;ztx=p.clientX-sx;zty=p.clientY-sy;applyAvatar();};
 const up=()=>{if(dragging){dragging=false;w.classList.remove('grabbing');}};
 w.addEventListener('mousedown',down);window.addEventListener('mousemove',move);window.addEventListener('mouseup',up);
 w.addEventListener('touchstart',down,{passive:false});window.addEventListener('touchmove',move,{passive:false});window.addEventListener('touchend',up);
})();
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open');}
function closeAll(){closeDrawer();document.getElementById('panel').classList.remove('open');}
let tt;function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2100);}

renderRail();renderAvail();renderGrid();renderDrawer();renderWorn();
</script>
</body>
</html>
